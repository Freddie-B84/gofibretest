<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watson Orchestrate Chat</title>
  <script>
    // Mobile detection (from Nuno Santos)
    function isMobileDevice() {
      let userAgent = navigator.userAgent.toLowerCase();
      let mobileRegex = /android|iphone|ipad|ipod|blackberry|windows phone/;
      let isMobileUA = mobileRegex.test(userAgent);
      let isSmallScreen = window.matchMedia("(max-width: 767px)").matches;
      let isUAMobile = navigator.userAgentData?.mobile;
      return isMobileUA || isSmallScreen || isUAMobile;
    }
    var isMobile = isMobileDevice();

    window.wxOConfiguration = {
      orchestrationID: "95f3b39ecb0a4fd7b5f71872005ef2f5_0b12d9ae-1699-4363-85d2-ab04cc176571",
      hostURL: "https://eu-gb.watson-orchestrate.cloud.ibm.com",
      rootElementID: "root",
      showLauncher: true,
      deploymentPlatform: "ibmcloud",
      crn: "crn:v1:bluemix:public:watsonx-orchestrate:eu-gb:a/95f3b39ecb0a4fd7b5f71872005ef2f5:0b12d9ae-1699-4363-85d2-ab04cc176571::",
      chatOptions: {
        agentId: "19218c6f-267e-4bda-8007-d6adcc7d43c0",
        agentEnvironmentId: "fe676649-fce2-47c4-9036-f4c7d96837ba"
      },
      // Always use float — CSS handles fullscreen on mobile
      layout: {
        form: "float",
        showOrchestrateHeader: true,
        width: isMobile ? '100vw' : (window.innerWidth * 0.3) + 'px',
        height: isMobile ? '100vh' : (window.innerHeight * 0.75) + 'px'
      },
      style: {
        headerColor: '#DEF9ED',
        userMessageBackgroundColor: '#DEF9ED',
        primaryColor: '#ADEFD2'
      }
    };

    setTimeout(function () {
      const script = document.createElement('script');
      script.src = `${window.wxOConfiguration.hostURL}/wxochat/wxoLoader.js?embed=true`;
      script.onload = function () {
        wxoLoader.init();
      };
      document.head.appendChild(script);
    }, 0);
  </script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    /* Desktop: keep button bottom right */
    .wxo-float-container .chatButton {
      right: 16px !important;
      left: auto !important;
      bottom: 16px !important;
    }

    /* Mobile: force the chat window to be truly fullscreen */
    @media (max-width: 767px) {
      /* The floating chat panel */
      .wxo-float-container .wxo-float-panel,
      .wxo-float-container .WxOChatContainer,
      .wxo-float-container .WxOLiteMainContainer {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100% !important;
        height: 100% !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        border-radius: 0 !important;
        margin: 0 !important;
      }

      /* Support dynamic viewport height on iOS */
      @supports (height: 100dvh) {
        .wxo-float-container .wxo-float-panel,
        .wxo-float-container .WxOChatContainer,
        .wxo-float-container .WxOLiteMainContainer {
          height: 100dvh !important;
          max-height: 100dvh !important;
        }
      }

      /* Keep launcher button visible and accessible */
      .wxo-float-container .chatButton {
        right: 15px !important;
        bottom: 15px !important;
        left: auto !important;
        z-index: 9999 !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
