<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Watson Orchestrate Chat</title>
  <script>
    // Mobile detection (from Nuno Santos)
    function isMobileDevice() {
      let userAgent = navigator.userAgent.toLowerCase();
      let mobileRegex = /android|iphone|ipad|ipod|blackberry|windows phone/;
      let isMobileUA = mobileRegex.test(userAgent);
      let isSmallScreen = window.matchMedia("(max-width: 767px)").matches;
      let isUAMobile = navigator.userAgentData?.mobile;
      return isMobileUA || isSmallScreen || isUAMobile;
    }
    var isMobile = isMobileDevice();
    
    window.wxOConfiguration = {
      orchestrationID: "95f3b39ecb0a4fd7b5f71872005ef2f5_0b12d9ae-1699-4363-85d2-ab04cc176571",
      hostURL: "https://eu-gb.watson-orchestrate.cloud.ibm.com",
      rootElementID: "root",
      showLauncher: true,
      deploymentPlatform: "ibmcloud",
      crn: "crn:v1:bluemix:public:watsonx-orchestrate:eu-gb:a/95f3b39ecb0a4fd7b5f71872005ef2f5:0b12d9ae-1699-4363-85d2-ab04cc176571::",
      chatOptions: {
        agentId: "19218c6f-267e-4bda-8007-d6adcc7d43c0",
        agentEnvironmentId: "fe676649-fce2-47c4-9036-f4c7d96837ba"
      },
      // Always use float mode - CSS will handle fullscreen on mobile
      layout: {
        form: "float",
        showOrchestrateHeader: true,
        width: isMobile ? '100vw' : (window.innerWidth * 0.3) + 'px',
        height: isMobile ? '100vh' : (window.innerHeight * 0.75) + 'px'
      },
      style: {
        headerColor: '#DEF9ED',
        userMessageBackgroundColor: '#DEF9ED',
        primaryColor: '#ADEFD2'
      }
    };

    setTimeout(function () {
      const script = document.createElement('script');
      script.src = `${window.wxOConfiguration.hostURL}/wxochat/wxoLoader.js?embed=true`;
      script.onload = function () {
        wxoLoader.init();
        
        // Fix: Remove fullscreen-hidden class when chat button is clicked
        if (isMobile) {
          document.addEventListener('click', function(e) {
            if (e.target.closest('.chatButton')) {
              document.body.classList.remove('fullscreen-hidden');
            }
          });
        }
        
        /* COMMENTED OUT FOR TESTING
        const processed = new Set();
        function styleButtons() {
          document.querySelectorAll('button').forEach(function (button) {
            if (processed.has(button) || button.classList.contains('chatButton')) return;
            const isSmallButton = button.offsetHeight < 50;
            const hasShortText = button.textContent.trim().length < 50;
            const notInHeader = !button.closest('.wxo-float-header');
            if (isSmallButton && hasShortText && notInHeader) {
              processed.add(button);
              Object.assign(button.style, {
                backgroundColor: '#ffffff',
                color: '#000000',
                border: '1px solid #d1d1d1',
                transition: 'all 0.2s ease'
              });
              button.onmouseenter = function () {
                Object.assign(button.style, { backgroundColor: '#ADEFD2', borderColor: '#ADEFD2' });
              };
              button.onmouseleave = function () {
                Object.assign(button.style, { backgroundColor: '#ffffff', borderColor: '#d1d1d1' });
              };
            }
          });
        }
        new MutationObserver(function () {
          setTimeout(styleButtons, 100);
        }).observe(document.body, { childList: true, subtree: true });
        styleButtons();
        setInterval(styleButtons, 500);
        */
      };
      document.head.appendChild(script);
    }, 0);
  </script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }
    /* Keep button in bottom right */
    .wxo-float-container .chatButton {
      right: 16px !important;
      left: auto !important;
      bottom: 16px !important;
      z-index: 10001 !important;
    }
    /* Mobile: Force chat panel to fullscreen */
    @media (max-width: 767px) {
      .wxo-float-container .WxOChatContainer,
      .wxo-float-container .WxOChatContainer.WxOChatReset.WxOChatStyles {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        border-radius: 0 !important;
        margin: 0 !important;
        z-index: 10000 !important;
        transform: none !important;
      }
    }
    
    /* Fix: Override fullscreen-hidden when chat should be open */
    body.wxo-chat-open .WxOChatContainer,
    body.wxo-chat-open.fullscreen-hidden .WxOChatContainer {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
